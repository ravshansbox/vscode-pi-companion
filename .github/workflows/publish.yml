name: Publish to VS Code Marketplace & npm

on:
  push:
    branches: [main]

jobs:
  publish-vscode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install vsce
        run: npm install -g @vscode/vsce
      
      - name: Publish to VS Code Marketplace
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "github-actions@github.com"
          
          # Package and publish with version bump
          npx vsce package
          vsce publish patch --pat $VSCE_TOKEN --skip-duplicate
          
          # Push the tag created by vsce
          git push --follow-tags origin main

  publish-npm:
    runs-on: ubuntu-latest
    needs: publish-vscode
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # Required for OIDC Trusted Publishing
      
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Publish to npm
        run: npm publish --access public --skip-duplicate
